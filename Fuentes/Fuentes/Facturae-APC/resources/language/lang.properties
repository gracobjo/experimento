HistInfo_AppEnd=Aparici\u00F3n de la ventana de cierre de la aplicaci\u00F3n, con los colores degradados en verde. La base de datos se cierra de manera segura guardando toda la informaci\u00F3n.
HistInfo_AppStart=Aparici\u00F3n de la ventana principal de la aplicaci\u00F3n. Consta de un \u00E1rbol, localizado en la parte superior izquierda, en el que se puede seleccionar un tipo de factura concreto, visualiz\u00E1ndose a continuaci\u00F3n el listado correspondiente en la tabla principal. Asociado a cada tipo de factura existe un men\u00FA (en la parte central inferior) con acciones espec\u00EDficas para cada tipo de factura, mientras que en el lateral izquierdo de la ventana existe una serie de botones con las funciones generales que la aplicaci\u00F3n puede llevar a cabo. Finalmente, en el margen superior existe un filtro de b\u00FAsqueda para facilitar el proceso de listado de las facturas almacendas en la aplicaci\u00F3n.
HistInfo_ConfChange=Modificaci\u00F3n de aquellos par\u00E1metros de la aplicaci\u00F3n configurables por el usuario tales como el lenguaje o el logotipo.
HistInfo_EditIn=Edici\u00F3n de todos los datos asociados a una determinada factura (o a un determinado borrador) con la posibilidad de modificarlos. Se permite la posibilidad de guardar un borrador o firmar la factura una vez editada.
HistInfo_ExpBBDD=Exportaci\u00F3n de la base de datos propia (con todas las facturas y borradores almacenados en su interior) a un fichero (con extensi\u00F3n .fedb) para su posterior importaci\u00F3n desde otra aplicaci\u00F3n de facturaci\u00F3n electr\u00F3nica.</P>
HistInfo_GenIVA=Generaci\u00F3n de un resumen de todas aquellas facturas (emitidas, recibidas, o ambas) en la que el concepto (o uno de los conceptos) presenta IVA como impuesto repercutido. Se muestra tambi\u00E9n el recargo de equivalencia (RE) asociado a cada concepto (en el caso de que exista) as\u00ED como un resumen final de la base imponible total, los impuestos totales (relacionados con IVA y RE) y el importe total.
HistInfo_ImpBBDD=Importaci\u00F3n de una base de datos externa (con extensi\u00F3n .fedb) al interior de la aplicaci\u00F3n. Tras la importaci\u00F3n, todas las facturas y borradores de la base de datos ser\u00E1n accesibles desde la aplicaci\u00F3n.
HistInfo_NewParty=Creaci\u00F3n de un sujeto (emisor o receptor) totalmente nuevo o modificaci\u00F3n de uno ya existente (en este \u00FAltimo caso, la aplicaci\u00F3n mostrar\u00E1 el \u00FAltimo sujeto dado de alta de entre todos aquellos que compartan el mismo CIF / NIF). En cualquiera de los dos casos al nuevo sujeto creado se le asignar\u00E1 un nuevo identificador. Debe tenerse en cuenta, adem\u00E1s, que existe una serie de campos de obligada cumplimentaci\u00F3n (marcados con un asterisco\: '*') para generar satisfactoriamente un sujeto, mientras que otros son opcionales. 
HistInfo_ReceiveIn=Recepci\u00F3n de una factura externa con extensi\u00F3n xml o xsig. Si dicha factura supera las tres validaciones existentes (a saber\: de esquema, de firma y contable) entonces se introduce en la base de datos de la aplicaci\u00F3n y se le asigna el siguiente identificador\: "Recibida-XX", donde XX es el n\u00FAmero de facturas recibidas hasta ese momento.
HistInfo_RectIn=Rectificaci\u00F3n de una factura emitida o enviada. Esta acci\u00F3n no est\u00E1 asociada ni a borradores ni a facturas recibidas o rectificadas. Se permite la modificaci\u00F3n de cualquier campo de la factura a excepci\u00F3n del n\u00FAmero de factura. Posteriormente, se puede guardar un borrador o firmar la factura rectificativa (en el segundo caso, aparecer\u00E1 una ventana emergente en la que se deber\u00E1 seleccionar el campo rectificado as\u00ED como el m\u00E9todo de rectificaci\u00F3n).
HistInfo_ResendIn=Reenv\u00EDo por correo electr\u00F3nico de una factura ya enviada, pudiendo ser el destinatario diferente al receptor del primer env\u00EDo
HistInfo_SaveDraft=Se guardan en base de datos los datos del borrador generado. T\u00E9cnicamente dicho borrador no se puede considerar una factura pues carece de firma digital. Existe la posibilidad de visualizar dicho borrador para firmarlo o editarlo para modificarlo y posteriormente firmarlo. En ambos casos el borrador desaparecer\u00EDa de la base de datos y pasar\u00EDa a constituir una factura emitida, constando como tal (con el identificador pertinente) en la misma.
HistInfo_SeeIn=Visualizaci\u00F3n de todos los datos asociados a una determinada factura (o a un determinado borrador) sin posibilidad de modificarlos.
HistInfo_SeeRect=Comprobaci\u00F3n de los campos rectificados as\u00ED como de la factura rectificada asociada
HistInfo_SendFACe=Env\u00EDo a FACe la factura generada XSIG
HistInfo_SendIn=Env\u00EDo por correo electr\u00F3nico de la factura generada XSIG
HistInfo_SignIn=Se firma un borrador con ayuda de un certificado digital reconocido y v\u00E1lido (en vigor); en tal caso, el borrador desaparecer\u00EDa de la base de datos y pasar\u00EDa a constituir una factura emitida, constando como tal (con el identificador pertinente) en la misma. No est\u00E1 permitido firmar una factura emitida o enviada, aunque si se podr\u00E1 firmar una factura rectificativa, constando en base de datos vomo factura rectificativa emitida.
