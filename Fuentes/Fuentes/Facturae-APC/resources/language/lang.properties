Store.JavaMsg1=<html>Esta opci\u00F3n permite acceder, mediante una pasarela de comunicaciones, al almac\u00E9n de certificados contenido dentro del navegador Internet Explorer, permiti\u00E9ndo as\u00ED utilizar los certificados personales cargados en el navegador para realizar firmas electr\u00F3nicas. Para administrar \u00E9ste almacen, abra un navegador IExplorer y haga clic en la opci\u00F3n de men\u00FA "Herramientas/Opciones de internet". Se abrir\u00E1 un cuadro de di\u00E1logo con pesta\u00F1as. Seleccione la pesta\u00F1a "Contenido" y finalmente presione el bot\u00F3n "Certificados". Se abrir\u00E1 un cuadro de di\u00E1logo desde el que usted podr\u00E1 administrar los certificados de este almac\u00E9n.</html>
Store.JavaMsg2=<html>Este almac\u00E9n le permite administrar sus propios certificados tanto personales como de autoridades de confianza. En primer lugar es necesario indicar el fichero de configuraci\u00F3n a utilizar, y si este no existe, se le preguntar\u00E1 si desea crearlo. Para incluir, eliminar o editar las propiedades de un certificado, haga clic en el siguiente bot\u00F3n para administrar el almac\u00E9n. </html>
