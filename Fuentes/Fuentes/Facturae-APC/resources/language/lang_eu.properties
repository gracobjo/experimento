HistInfo_AppEnd=Aplikazioa itxi egin dela adierazten duen leihoa azaldu, berde antzeko koloreekin. Datu-basea modu seguruan ixten da eta informazio guztia gordetzen du.
HistInfo_AppStart=Aplikazioaren leiho nagusia azaldu. Zuhaitz bat du, ezker-goian, faktura zehatz bat hautatu daiteke, eta jarraian taula nagusian dagokion zerrenda bistaratu. Faktura mota bakoitzari lotuta menu bat dago (erdian behean), faktura mota bakoitzarentzat ekintza zehatzak ditu, eta leihoaren ezker alboan botoi batzuk daude aplikazioak egin ditzaken funtzio nagusiak azalduz. Azkenik, goian bilaketa iragazki bat dago aplikazioan gordetako fakturen zerrenda egiteko.
HistInfo_ConfChange=Erabiltzaileak ezarri ditzakeen aplikazioaren parametroak aldatu, hizkuntza eta logotipoa adibidez.
HistInfo_EditIn=Faktura jakin bati (edo zirriborro jakin bati) lotutako datu guztiak editatu aldatzeko aukerarekin. Editatu ondoren zirriborro bat gordetzeko edo faktura sinatzeko aukera dago.
HistInfo_ExpBBDD=Berezko datu-basea esportatu (barruan gordeta dauden faktura eta zirriborroekin) fitxategi batera (.fedb luzapena duena) eta gero fakturazio elektronikoko beste aplikazio batetik inportatu.</P>
HistInfo_GenIVA=Jasanarazitako BEZa kontzeptu gisa (kontzeptu bakarra edo kontzeptuetako bat) duten faktura guztien (igorritakoak, jasotakoak edo biak) laburpena sortzea. Kontzeptu bakoitzari lotutako (egongo balitz) Baliokidetasun-errekargua (BE) azaltzen da, eta oinarrizko zerga osoaren azken laburpena, zergak guztira (BEZ eta BEri lotuta) eta zenbatekoa guztira ere bai.
HistInfo_ImpBBDD=Kanpoko datu-base bat inportatu (.fedb luzapena duena) aplikazio barrura. Inportatu ondoren datu-basearen faktura eta zirriborro guztiak eskuragarriak izango dira aplikaziotik.
HistInfo_NewParty=Subjektu berri bat (igorlea edo hartzailea) sortu edo lehendik dagoen bat aldatu (azken kasu horretan aplikazioak alta emandako azken subjektua erakutsiko du, IFK/IFZ berdina duten guztien artean). Bietako edozein kasutan sortutako subjektu bakoitzari identifikatzaile berria esleituko zaio. Kontuan izan behar da gainera, derrigorrez bete behar diren eremuak daudela (izartxoa dutenak: '*') subjektu bat sortu nahi izanez gero, eta beste batzuk, aldiz, aukerakoak dira. 
HistInfo_ReceiveIn=Kanpoko faktura bat jaso xml edo xsig luzapena dutenak. Faktura horrek lehendik dauden hiru balidazioak gainditzen baditu (hau da: eskema, sinadura eta kontabilitatea) aplikazioaren datu-basean sartzen da eta ondorengo identifikatzailea esleitzen zaio: "Jasota-XX", eta XX une horretara arte jasotako faktura kopurua izango da.
HistInfo_RectIn=Igorritako edo bidalitako faktura bat zuzendu. Ekintza hori ez dago lotuta zirriborroei ezta jasotako edo zuzendutako fakturei ere. Fakturaren edozein eremu alda daiteke, faktura zenbakia izan ezik. Gero, zirriborro bat gorde daiteke edo faktura zuzentzailea sinatu (bigarren kasuan leiho bat azalduko da eta zuzendutako eremua hautatu behar da eta zuzentzeko modua ere bai).
HistInfo_ResendIn=Dagoeneko bidalitako faktura posta elektronikoz bidali, eta hartzailea lehen bidalketa jaso duenaren desberdina izan daiteke.
HistInfo_SaveDraft=Sortutako zirriborroaren datuak gordetzen dira datu-basean. Teknikoki zirriborro hori ezin da fakturatzat hartu sinadura digitalik ez duelako. Zirriborro hori bistaratu daiteke sinatzeko edo editatu aldatzeko eta gero sinatzeko. Kasu bietan zirriborroa desagertu egingo litzateke datu-basetik eta igorritako faktura izango litzateke (dagokion identifikatzailearekin).
HistInfo_SeeIn=Faktura jakin bati (edo zirriborro jakin bati) lotutako datu guztiak bistaratu aldatzeko aukerarik gabe.
HistInfo_SeeRect=Zuzendutako eremuak eta horri dagokion zuzendutako faktura egiaztatu
HistInfo_SendFACe=XSIG sortutako faktura bidaltzea FACe
HistInfo_SendIn=XSIG sortutako faktura posta elektronikoz bidali.
HistInfo_SignIn=Zirriborro bat sinatzen da baimendutako eta balioduna den (indarrean dagoena) ziurtagiri digital batekin; hala izanez gero, zirriborroa desagertu egingo litzateke datu-basetik eta igorritako faktura izango litzateke (dagokion identifikatzailearekin). Igorritako edo bidalitako faktura bat ezin da sinatu, baina faktura zuzentzaile bat sinatu daiteke eta datu-basean igorritako faktura zuzentzaile gisa gordeko da.
