Store.JavaList=Hautatu aukera hau Javaren jabe biltegian biltegiratutako ziurtagiriak eskuratu nahi badituzu
Store.JavaMsg1=<html>Aukera honi esker, Internet Explorer nabigatzaileko ziurtagirien biltegira sar daiteke komunikazio pasagune baten bidez, eta, horrela, nabigatzailean kargatutako ziurtagiri pertsonalak erabili ahal izango dira sinadura elektronikoak egiteko. Biltegi hori administratu ahal izateko, zabal ezazu IExplorer nabigatzaile bat eta egin klik menuko &quot;Tresnak/Internet aukerak&quot; aukeraren gainean. Elkarrizketa-koadro bat zabalduko da fitxekin. Aukeratu "Edukia" fitxa, eta sakatu &quot;Ziurtagiriak&quot; botoiaren gainean. Elkarrizketa-koadro bat zabalduko da, biltegiko ziurtagiriak administra ditzazun.</html>
Store.JavaMsg2=<html>Biltegi horri esker, zeure ziurtagiriak administratu ahal izango dituzu, pertsonalak zein konfiantzazko agintarienak. Lehenik eta behin, erabiliko den konfigurazio fitxategia adierazi behar da, eta existitzen ez bada, berri bat sortu nahi duzun galdetuko zaizu. Sartzeko, ezabatu edo editatu ziurtagiri baten ezaugarriak eta egin klik hurrengo botoian biltegia administratzeko. </html>
