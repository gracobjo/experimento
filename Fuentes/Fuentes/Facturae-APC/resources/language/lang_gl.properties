Store.JavaMsg1=<html>Esta opci\u00F3n permite acceder, mediante unha pasarela de comunicaci\u00F3ns, ao almac\u00E9n de certificados contido dentro do navegador Internet Explorer, permitindo as\u00ED utilizar os certificados persoais cargados no navegador para realizar sinaturas electr\u00F3nicas. Para administrar este almac\u00E9n, abra un navegador IExplorer e faga clic na opci\u00F3n de men\u00FA "Ferramentas/Opci\u00F3ns de internet". Abrirase un cadro de di\u00E1logo con pestanas. Seleccione a pestana "Contido" e, finalmente, prema No bot\u00F3n "Certificados". Abrirase un cadro de di\u00E1logo dende o que vostede poder\u00E1 administrar os certificados deste almac\u00E9n.</html>
Store.JavaMsg2=<html>Este almac\u00E9n perm\u00EDtelle administrar os seus propios certificados, tanto persoais coma de autoridades de confianza. En primeiro lugar, \u00E9 necesario indicar o ficheiro de configuraci\u00F3n que se vai utilizar e, se este non existe, preguntar\u00E1selle se desexa crealo. Para inclu\u00EDr, eliminar ou editar as propiedades dun certificado, faga clic no seguinte bot\u00F3n para administrar o almac\u00E9n. </html>
