HistInfo_AppEnd=Aparici\u00F3n da vent\u00E1 de peche da aplicaci\u00F3n, coas cores degradadas en verde. A base de datos p\u00E9chase de xeito seguro gardando toda a informaci\u00F3n.
HistInfo_AppStart=Aparici\u00F3n da vent\u00E1 principal da aplicaci\u00F3n. Consta dunha \u00E1rbore, localizada na parte superior esquerda, na que se pode seleccionar un tipo de factura concreto, visualiz\u00E1ndose a continuaci\u00F3n a listaxe correspondente na t\u00E1boa principal. Asociado a cada tipo de factura existe un men\u00FA (na parte central inferior) con acci\u00F3ns espec\u00EDficas para cada tipo de factura, mentres que no lateral esquerdo da vent\u00E1 hai unha serie de bot\u00F3ns coas funci\u00F3ns xerais que a aplicaci\u00F3n pode levar a cabo. Finalmente, na marxe superior existe un filtro de busca para facilitar o proceso de listaxe das facturas almacenadas na aplicaci\u00F3n.
HistInfo_ConfChange=Modificaci\u00F3n daqueles par\u00E1metros da aplicaci\u00F3n configurables polo usuario, como a linguaxe ou o logotipo.
HistInfo_EditIn=Edici\u00F3n de todos os datos asociados a unha determinada factura (ou a un determinado borrador) coa posibilidade de modificalos. Perm\u00EDtese a posibilidade de gardar un borrador ou asinar a factura unha vez editada.
HistInfo_ExpBBDD=Exportaci\u00F3n da base de datos propia (con todas as facturas e borradores almacenados no seu interior) a un ficheiro (con extensi\u00F3n .fedb) para a s\u00FAa posterior importaci\u00F3n dende outra aplicaci\u00F3n de facturaci\u00F3n electr\u00F3nica.</P>
HistInfo_GenIVA=Xeraci\u00F3n dun resumo de todas aquelas facturas (emitidas, recibidas ou ambas as d\u00FAas) nas que o concepto (ou un dos conceptos) presenta IVE como imposto repercutido. M\u00F3strase tam\u00E9n a recarga de equivalencia (RE) asociada a cada concepto (no caso de que exista), as\u00ED como un resumo final da base impo\u00F1ible total, os impostos totais (relacionados con IVE e RE) e o importe total.
HistInfo_ImpBBDD=Importaci\u00F3n dunha base de datos externa (con extensi\u00F3n .fedb) ao interior da aplicaci\u00F3n. Tras a importaci\u00F3n, todas as facturas e borradores da base de datos ser\u00E1n accesibles dende a aplicaci\u00F3n.
HistInfo_NewParty=Creaci\u00F3n dun suxeito (emisor ou receptor) totalmente novo ou modificaci\u00F3n dun xa existente (neste \u00FAltimo caso, a aplicaci\u00F3n mostrar\u00E1 o \u00FAltimo suxeito dado de alta de entre todos aqueles que compartan o mesmo CIF / NIF). En calquera dos dous casos, ao novo suxeito creado asignar\u00E1selle un novo identificador. Debe terse en conta, ademais, que hai unha serie de campos que \u00E9 obrigado encher (marcados cun asterisco\: ' * ') para xerar satisfactoriamente un suxeito, mentres que outros son opcionais. 
HistInfo_ReceiveIn=Recepci\u00F3n dunha factura externa con extensi\u00F3n xml ou xsig. Se esta factura supera as tres validaci\u00F3ns existentes (\u00E9 dicir\: de esquema, de sinatura e contable), introd\u00FAcese na base de datos da aplicaci\u00F3n e as\u00EDgnaselle o seguinte identificador\: "Recibida-XX", onde XX \u00E9 o n\u00FAmero de facturas recibidas ata ese momento.
HistInfo_RectIn=Rectificaci\u00F3n dunha factura emitida ou enviada. Esta acci\u00F3n non est\u00E1 asociada nin a borradores nin a facturas recibidas ou rectificadas. Perm\u00EDtese a modificaci\u00F3n de calquera campo da factura, ag\u00E1s o n\u00FAmero de factura. Posteriormente, p\u00F3dese gardar un borrador ou asinar a factura rectificativa (no segundo caso, aparecer\u00E1 unha vent\u00E1 emerxente na que se deber\u00E1 seleccionar o campo rectificado, as\u00ED como o m\u00E9todo de rectificaci\u00F3n).
HistInfo_ResendIn=Reenv\u00EDo por correo electr\u00F3nico dunha factura xa enviada, podendo ser o destinatario diferente ao receptor do primeiro env\u00EDo
HistInfo_SaveDraft=G\u00E1rdanse en base de datos os datos do borrador xerado. Tecnicamente, o devandito borrador non se pode considerar unha factura, pois carece de sinatura dixital. Existe a posibilidade de visualizar este borrador para asinalo ou editalo para modificalo e posteriormente asinalo. En ambos os dous casos, o borrador desaparecer\u00EDa da base de datos e pasar\u00EDa a constitu\u00EDr unha factura emitida, constando como tal (co identificador pertinente) nesta.
HistInfo_SeeIn=Visualizaci\u00F3n de todos os datos asociados a unha determinada factura (ou a un determinado borrador) sen posibilidade de modificalos.
HistInfo_SeeRect=Comprobaci\u00F3n dos campos rectificados, as\u00ED como da factura rectificada asociada
HistInfo_SendIn=Env\u00EDo por correo electr\u00F3nico da factura xerada XSIG
HistInfo_SignIn=As\u00EDnase un borrador con axuda dun certificado dixital reco\u00F1ecido e v\u00E1lido (en vigor); nese caso, o borrador desaparecer\u00EDa da base de datos e pasar\u00EDa a constitu\u00EDr unha factura emitida, constando como tal (co identificador pertinente) nesta. Non est\u00E1 permitido asinar unha factura emitida ou enviada, a\u00EDnda que se se poder\u00E1 asinar unha factura rectificativa, que constar\u00E1 en base de datos como factura rectificativa emitida.
